name: Contribute skill to ripo-skills-main

on:
  push:
    paths:
      - '.claude/plugins/**/SKILL.md'

jobs:
  contribute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed skills
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD \
            | grep -E '^\.claude/plugins/.+/SKILL\.md$' \
            | sed 's|.*/\([^/]*\)/SKILL\.md|\1|' \
            | tr '\n' ' ')
          echo "skills=$CHANGED" >> $GITHUB_OUTPUT
          echo "Detected: $CHANGED"

      - name: Process and contribute to ripo-skills-main
        if: steps.detect.outputs.skills != ''
        env:
          GH_TOKEN: ${{ secrets.PUSH_TARGET_TOKEN }}
          SKILLS: ${{ steps.detect.outputs.skills }}
          SOURCE_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -e

          cat > /tmp/process_skill.py << 'PYEOF'
          import sys, re, os

          src_path = sys.argv[1]
          dst_path = sys.argv[2]

          with open(src_path, 'r') as f:
              content = f.read()

          body = re.sub(r'```[\s\S]*?```', '', content)

          PROJECT_FILES = {
              'PRODUCT.md':  '[your-product-file]',
              'JOURNEY.md':  '[your-journey-file]',
              'AGENT.md':    '[your-agent-file]',
              'REGISTRY.md': '[your-registry-file]',
          }
          SERVICES = ['Railway', 'Supabase', 'Telegram', 'OpenRouter', 'TypeORM', 'Prisma', 'Vercel', 'Cloudflare']

          score = 100
          blocked = []

          def penalise(label, amount):
              global score
              if label not in blocked:
                  blocked.append(label)
                  score -= amount

          for m in re.findall(r'dev/(?:changes|ideas)/[\w-]+', body):
              penalise(m, 15)
          for ref in PROJECT_FILES:
              if ref in body:
                  penalise(ref, 15)
          for svc in SERVICES:
              if svc in body:
                  penalise(svc, 10)
          for p in re.findall(r'`(/(?!tmp)[^`\s]{3,})`', body):
              penalise(p, 15)

          fm_match = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
          if fm_match:
              src_exp_match = re.search(r'^source-experiment:\s*"?(\S+?)"?\s*$', fm_match.group(1), re.MULTILINE)
              if src_exp_match and src_exp_match.group(1) != 'core':
                  penalise('non-core source-experiment', 20)

          score = max(0, min(100, score))
          synthesis_required = score < 80
          out = content

          if synthesis_required:
              saved = []
              def save(block_match):
                  saved.append(block_match.group(0))
                  return f'<<<BLOCK_{len(saved)-1}>>>'
              out = re.sub(r'```[\s\S]*?```', save, out)
              out = re.sub(r'dev/(changes|ideas)/[\w-]+',
                           lambda m: f'dev/{m.group(1)}/[your-{m.group(1)[:-1]}-slug]', out)
              for ref, ph in PROJECT_FILES.items():
                  out = out.replace(ref, ph)
              for svc in SERVICES:
                  out = out.replace(svc, f'[your-{svc.lower()}]')
              for i, block in enumerate(saved):
                  out = out.replace(f'<<<BLOCK_{i}>>>', block)
              out = re.sub(r'(source-experiment:\s*)[^\n]+', r'\1core', out, count=1)

          meta = [f'scope: global', f'portability: {score}',
                  f'synthesis-required: {"true" if synthesis_required else "false"}',
                  f'source-repo: {os.environ.get("SOURCE_REPO", "unknown")}']
          if synthesis_required and blocked:
              meta += ['blocked-refs:'] + [f'  - {b}' for b in blocked]
          out = re.sub(r'\n---\n', '\n' + '\n'.join(meta) + '\n---\n', out, count=1)

          os.makedirs(os.path.dirname(dst_path), exist_ok=True)
          with open(dst_path, 'w') as f:
              f.write(out)

          action = 'synthesized' if synthesis_required else 'direct'
          print(f'SCORE:{score}|ACTION:{action}|REFS:{len(blocked)}')
          PYEOF

          BASE_SHA=$(curl -sf -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/edri2or/ripo-skills-main/git/refs/heads/main \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['object']['sha'])")

          if [ -z "$BASE_SHA" ] || [ "${#BASE_SHA}" -ne 40 ]; then
            echo "ERROR: could not resolve main SHA for ripo-skills-main" >&2
            exit 1
          fi

          # Build skill→path map in one find pass
          declare -A SKILL_PATHS
          while IFS= read -r -d '' path; do
            name=$(basename "$(dirname "$path")")
            SKILL_PATHS[$name]="$path"
          done < <(find .claude/plugins -name "SKILL.md" -print0)

          for SKILL in $SKILLS; do
            SKILL_PATH="${SKILL_PATHS[$SKILL]:-}"
            if [ -z "$SKILL_PATH" ]; then
              echo "WARN: $SKILL not found in .claude/plugins" >&2
              continue
            fi

            EXPORTED="/tmp/$SKILL-exported.md"
            OUT=$(SOURCE_REPO="$SOURCE_REPO" python3 /tmp/process_skill.py "$SKILL_PATH" "$EXPORTED")
            SCORE=$(python3 -c "import re,sys; m=re.search(r'SCORE:(\d+)',sys.argv[1]); print(m.group(1) if m else '')" "$OUT")
            ACTION=$(python3 -c "import re,sys; m=re.search(r'ACTION:(\w+)',sys.argv[1]); print(m.group(1) if m else '')" "$OUT")

            if [ -z "$SCORE" ] || [ -z "$ACTION" ]; then
              echo "ERROR: templatizer output malformed for $SKILL: $OUT" >&2
              continue
            fi

            CONTENT=$(base64 -w0 "$EXPORTED")
            BRANCH="sync/$SKILL-$(date -u +%Y-%m-%d)-${RUN_ID}"

            curl -sf -X POST -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/edri2or/ripo-skills-main/git/refs \
              -d "$(jq -n --arg ref "refs/heads/$BRANCH" --arg sha "$BASE_SHA" \
                    '{ref: $ref, sha: $sha}')" > /dev/null 2>&1 || true

            EXISTING_SHA=$(curl -sf -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/edri2or/ripo-skills-main/contents/exported-skills/$SKILL/SKILL.md" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")

            PAYLOAD=$(jq -n \
              --arg msg "sync: contribute $SKILL from $SOURCE_REPO (score: $SCORE/100, $ACTION)" \
              --arg content "$CONTENT" \
              --arg branch "$BRANCH" \
              --arg sha "$EXISTING_SHA" \
              'if $sha != "" then {message: $msg, content: $content, branch: $branch, sha: $sha}
               else {message: $msg, content: $content, branch: $branch} end')

            HTTP=$(curl -s -o /tmp/put-response.json -w '%{http_code}' \
              -X PUT -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/edri2or/ripo-skills-main/contents/exported-skills/$SKILL/SKILL.md" \
              -d "$PAYLOAD")

            if [ "$HTTP" != "200" ] && [ "$HTTP" != "201" ]; then
              echo "ERROR: file write failed for $SKILL (HTTP $HTTP): $(cat /tmp/put-response.json)" >&2
              continue
            fi

            PR_URL=$(curl -sf -X POST -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/edri2or/ripo-skills-main/pulls \
              -d "$(jq -n \
                    --arg title "sync($SKILL): contribute from $SOURCE_REPO" \
                    --arg body "**Skill:** \`$SKILL\`\n**Source:** \`$SOURCE_REPO\`\n**Portability:** $SCORE/100 ($ACTION)\n\nContributed by \`skill-contribute.yml\` — auto-merge will distribute to enrolled repos." \
                    --arg head "$BRANCH" \
                    '{title: $title, body: $body, head: $head, base: "main"}')" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('html_url',''))")

            echo "✓ $SKILL → ripo-skills-main: $PR_URL (score: $SCORE, $ACTION)"
          done
