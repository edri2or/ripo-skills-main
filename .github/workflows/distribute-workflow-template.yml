name: Distribute Workflow Template to Enrolled Repos

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (list repos without pushing)'
        required: false
        default: 'false'
  push:
    branches: [main]
    paths:
      - 'templates/workflows/skill-contribute.yml'
      - 'templates/skill-sync.yml'
      - '.github/workflows/distribute-workflow-template.yml'

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Distribute workflow templates to enrolled repos
        env:
          GH_TOKEN: ${{ secrets.PUSH_TARGET_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python3 << 'EOF'
          import urllib.request, urllib.error, json, os, base64

          token = os.environ['GH_TOKEN']
          dry_run = os.environ.get('DRY_RUN', 'false').lower() == 'true'
          headers = {
              'Authorization': f'token {token}',
              'Accept': 'application/vnd.github+json',
              'Content-Type': 'application/json',
          }

          def gh(method, path, data=None):
              url = f'https://api.github.com{path}'
              body = json.dumps(data).encode() if data else None
              req = urllib.request.Request(url, headers=headers, data=body, method=method)
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read()), None
              except urllib.error.HTTPError as e:
                  return None, e.code

          # Templates to distribute: (local_path, target_path_in_repo)
          templates = [
              ('templates/workflows/skill-contribute.yml', '.github/workflows/skill-contribute.yml'),
              ('templates/skill-sync.yml', '.github/workflows/skill-sync.yml'),
          ]

          template_contents = {}
          for local_path, _ in templates:
              with open(local_path, 'r') as f:
                  template_contents[local_path] = base64.b64encode(f.read().encode()).decode()

          # Discover enrolled repos (have skill-sync.yml)
          enrolled = []
          page = 1
          while True:
              repos, _ = gh('GET', f'/orgs/edri2or/repos?per_page=100&page={page}')
              if not repos:
                  break
              for repo in repos:
                  name = repo['full_name']
                  if name == 'edri2or/ripo-skills-main':
                      continue
                  _, err = gh('GET', f'/repos/{name}/contents/.github/workflows/skill-sync.yml')
                  if err is None:
                      enrolled.append(name)
              if len(repos) < 100:
                  break
              page += 1

          print(f'Found {len(enrolled)} enrolled repos', flush=True)

          if dry_run:
              print('DRY RUN — repos that would receive workflow templates:')
              for r in enrolled:
                  print(f'  {r}')
          else:
              ok = 0
              fail = 0
              summary = ['## Workflow Template Distribution', '| Repo | File | Status |', '|------|------|--------|']
              for repo in enrolled:
                  for local_path, target_path in templates:
                      content_b64 = template_contents[local_path]
                      target_name = target_path.split('/')[-1]
                      existing, _ = gh('GET', f'/repos/{repo}/contents/{target_path}')
                      payload = {
                          'message': f'chore: update {target_name} workflow from ripo-skills-main (PAT fix)',
                          'content': content_b64,
                      }
                      if existing:
                          payload['sha'] = existing['sha']
                      else:
                          payload['message'] = f'chore: add {target_name} workflow from ripo-skills-main'
                      _, err = gh('PUT', f'/repos/{repo}/contents/{target_path}', payload)
                      if err is None:
                          ok += 1
                          status = '✅'
                      else:
                          fail += 1
                          status = f'❌ HTTP {err}'
                      print(f'  {repo}/{target_name}: {status}', flush=True)
                      summary.append(f'| `{repo}` | `{target_name}` | {status} |')

              print(f'\nDone: {ok} succeeded, {fail} failed', flush=True)
              with open(os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null'), 'a') as f:
                  f.write('\n'.join(summary) + '\n')
          EOF
