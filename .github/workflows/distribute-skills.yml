name: Distribute Skills to Enrolled Repos

on:
  push:
    branches: [main]
    paths:
      - 'exported-skills/*/SKILL.md'
  workflow_dispatch:
    inputs:
      skills:
        description: 'Comma-separated skill names to distribute (blank = ALL)'
        required: false
        default: ''
      target_repo:
        description: 'Single enrolled repo to target (owner/repo) — blank = all enrolled repos'
        required: false
        default: ''

jobs:
  self-install:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 2

      - name: Detect changed skills
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD \
            | grep -E '^exported-skills/[^/]+/SKILL\.md$' \
            | sed 's|exported-skills/\([^/]*\)/SKILL\.md|\1|' \
            | tr '\n' ' ')
          echo "skills=$CHANGED" >> $GITHUB_OUTPUT
          echo "Detected: $CHANGED"

      - name: Install skills to .claude/commands/ via auto-PR
        if: steps.detect.outputs.skills != ''
        env:
          GH_TOKEN: ${{ secrets.RIPO_SKILLS_MAIN_PAT }}
        run: |
          python3 << 'PYEOF'
          import os, sys, base64, json, subprocess, urllib.request, urllib.error

          token = os.environ['GH_TOKEN']
          sha = '${{ github.sha }}'
          skills = '${{ steps.detect.outputs.skills }}'.split()
          repo = 'edri2or/ripo-skills-main'
          headers = {
              'Authorization': f'token {token}',
              'Accept': 'application/vnd.github+json',
              'Content-Type': 'application/json',
          }

          def gh(method, path, data=None):
              url = f'https://api.github.com{path}'
              body = json.dumps(data).encode() if data else None
              req = urllib.request.Request(url, headers=headers, data=body, method=method)
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read()), None
              except urllib.error.HTTPError as e:
                  return None, e.code

          for skill in skills:
              skill_path = f'exported-skills/{skill}/SKILL.md'
              if not os.path.exists(skill_path):
                  print(f'WARN: {skill_path} not found', flush=True)
                  continue

              raw = open(skill_path).read()
              fm_requires = {}
              source_plugin = None
              if raw.startswith('---'):
                  parts = raw.split('---', 2)
                  if len(parts) >= 2:
                      fm_requires, warns = parse_fm_requires(parts[1], skill)
                      warn_lines.extend(warns)
                      if fm_requires:
                          print(f'  {skill}: manifest declares {len(fm_requires)} custom placeholder(s)', flush=True)
                      sp_match = re.search(r'^source-plugin:\s*(\S+)', parts[1], re.MULTILINE)
                      if sp_match:
                          source_plugin = sp_match.group(1)
                      else:
                          scope_match = re.search(r'^scope:\s*(\S+)', parts[1], re.MULTILINE)
                          if scope_match:
                              source_plugin = scope_match.group(1)
                  body = parts[2].lstrip() if len(parts) >= 3 else raw
              else:
                  body = raw

              for repo in enrolled:
                  resolved = build_resolution_map(repo, fm_requires)
                  adapted_body, subs = adapt(body, resolved)
                  adapted_full, _ = adapt(raw, resolved)

                  content_b64 = base64.b64encode(adapted_body.encode()).decode()
                  existing, _ = gh('GET', f'/repos/{repo}/contents/.claude/commands/{skill}.md')
                  payload = {
                      'message': f'chore: distribute {skill} from ripo-skills-main',
                      'content': content_b64,
                  }
                  if existing:
                      payload['sha'] = existing['sha']

                  _, err = gh('PUT', f'/repos/{repo}/contents/.claude/commands/{skill}.md', payload)
                  adapted_label = f'{subs} subs' if subs else '—'

                  def write_plugin_files(branch=None):
                      if not source_plugin:
                          return
                      plugin_skill_path = f'.claude/plugins/{source_plugin}/skills/{skill}/SKILL.md'
                      ref_suffix = f'?ref={branch}' if branch else ''
                      existing_ps, _ = gh('GET', f'/repos/{repo}/contents/{plugin_skill_path}{ref_suffix}')
                      ps_payload = {
                          'message': f'chore: distribute {skill} to plugins/{source_plugin} from ripo-skills-main',
                          'content': base64.b64encode(adapted_full.encode()).decode(),
                      }
                      if branch:
                          ps_payload['branch'] = branch
                      if existing_ps:
                          ps_payload['sha'] = existing_ps['sha']
                      _, ps_err = gh('PUT', f'/repos/{repo}/contents/{plugin_skill_path}', ps_payload)
                      if ps_err:
                          print(f'  WARN: plugin write failed {skill}/{source_plugin} → {repo}: {ps_err}', flush=True)
                          return
                      pj_path = f'.claude/plugins/{source_plugin}/.claude-plugin/plugin.json'
                      existing_pj, _ = gh('GET', f'/repos/{repo}/contents/{pj_path}{ref_suffix}')
                      skill_ref = f'skills/{skill}/SKILL.md'
                      if existing_pj:
                          pj_raw = base64.b64decode(existing_pj['content'].replace('\n', '') + '==').decode()
                          pj_data = json.loads(pj_raw)
                          skills_list = pj_data.get('skills', [])
                          if skill_ref not in skills_list:
                              skills_list.append(skill_ref)
                              skills_list.sort()
                              pj_data['skills'] = skills_list
                              pj_payload = {
                                  'message': f'chore: register {skill} in {source_plugin}/plugin.json',
                                  'content': base64.b64encode((json.dumps(pj_data, indent=2) + '\n').encode()).decode(),
                                  'sha': existing_pj['sha'],
                              }
                              if branch:
                                  pj_payload['branch'] = branch
                              gh('PUT', f'/repos/{repo}/contents/{pj_path}', pj_payload)
                      else:
                          pj_data = {
                              'name': source_plugin,
                              'version': '1.0.0',
                              'description': f'Skills distributed from ripo-skills-main.',
                              'skills': [skill_ref],
                          }
                          pj_payload = {
                              'message': f'chore: initialize {source_plugin} plugin with {skill}',
                              'content': base64.b64encode((json.dumps(pj_data, indent=2) + '\n').encode()).decode(),
                          }
                          if branch:
                              pj_payload['branch'] = branch
                          gh('PUT', f'/repos/{repo}/contents/{pj_path}', pj_payload)

                  if err is None:
                      status = '✅'
                      write_plugin_files()
                  elif err in (409, 422):
                      date_tag = datetime.datetime.now(datetime.timezone.utc).strftime('%Y-%m-%d')
                      fb_branch = f'sync/distribute-{skill}-{date_tag}'
                      if repo not in _default_branch_cache:
                          repo_info, _ = gh('GET', f'/repos/{repo}')
                          _default_branch_cache[repo] = (repo_info or {}).get('default_branch', 'main')
                      default_branch = _default_branch_cache[repo]
                      ref_data, ref_err = gh('GET', f'/repos/{repo}/git/ref/heads/{default_branch}')
                      if ref_err or not ref_data:
                          status = f'❌ ref-fetch-failed ({ref_err})'
                          hard_failures += 1
                      else:
                          base_sha = ref_data['object']['sha']
                          gh('POST', f'/repos/{repo}/git/refs', {
                              'ref': f'refs/heads/{fb_branch}', 'sha': base_sha
                          })
                          fb_payload = {k: v for k, v in payload.items() if k != 'sha'}
                          fb_payload['branch'] = fb_branch
                          if existing:
                              fb_payload['sha'] = existing['sha']
                          _, write_err = gh('PUT', f'/repos/{repo}/contents/.claude/commands/{skill}.md', fb_payload)
                          if write_err:
                              status = f'❌ branch-write-failed ({write_err})'
                              hard_failures += 1
                          else:
                              write_plugin_files(branch=fb_branch)
                              plugin_note = f' and `plugins/{source_plugin}/skills/{skill}/SKILL.md`' if source_plugin else ''
                              pr_data, pr_err = gh('POST', f'/repos/{repo}/pulls', {
                                  'title': f'chore: distribute {skill} from ripo-skills-main',
                                  'body': f'Auto-generated: distributes `.claude/commands/{skill}.md`{plugin_note} from ripo-skills-main.\n\nDirect push blocked by branch protection — opening PR instead.',
                                  'head': fb_branch, 'base': default_branch,
                              })
                              if pr_err is None and pr_data:
                                  status = f'⚠️ PR #{pr_data["number"]} → {pr_data["html_url"]}'
                              elif pr_err == 422:
                                  status = '⚠️ PR already open'
                              else:
                                  status = f'❌ pr-open-failed ({pr_err})'
                                  hard_failures += 1
                  else:
                      status = f'❌ direct-write-failed ({err})'
                      hard_failures += 1
                  print(f'  {skill} → {repo}: {status} ({adapted_label})', flush=True)
                  summary_lines.append(f'| `{skill}` | `{repo}` | {adapted_label} | {status} |')


          if warn_lines:
              summary_lines += ['', '## ⚠️ Warnings'] + [f'- {w}' for w in warn_lines]

          with open(os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null'), 'a') as f:
              f.write('\n'.join(summary_lines) + '\n')

          if hard_failures:
              print(f'\n❌ {hard_failures} hard failure(s) — see Distribution Results above', flush=True)
              sys.exit(1)
          EOF
